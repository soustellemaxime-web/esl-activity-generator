<header class="app-header">
    <div class="left">
        <strong>My Teacher Space</strong>
    </div>

    <div class="right">
        <span id="userWelcome"></span>

        <button id="homeBtn" class="tutorial-allowed">
            <span class="icon">🏠 </span> 
            <span data-i18n="home">Home</span>
        </button>
        <button onclick="window.location.href='dashboard.html'" class="tutorial-allowed">
            <span class="icon">📂 </span>
            <span data-i18n="dashboard">Dashboard</span>
        </button>
        <button id="toggleLang" class="tutorial-allowed">
            <img id="langIcon" src="https://flagcdn.com/w20/gb.png" /> 
            <span data-i18n="language">Language</span>
        </button>
        <button id="toggleTheme" class="tutorial-allowed">
            <span class="icon">🌙 </span>
            <span data-i18n="darkmode">Dark mode</span>
        </button>

        <button id="loginBtn">Login</button>
        <button id="logoutBtn" style="display:none;">
            <span data-i18n="logout">Logout</span>
        </button>
    </div>

    <div id="loginModal" class="modal hidden">
        <div class="modal-content">
            <h3>Login</h3>
            <form id="loginForm">
                <input id="modalEmail" type="email" placeholder="Email" autocomplete="email">
                <div class="password-wrapper">
                    <input id="modalPassword" type="password" placeholder="Password" autocomplete="current-password">
                    <button type="button" id="togglePassword">👁️</button>
                </div>

                <div class="button-row">
                    <button type="submit" class="primary">Login</button>
                    <button type="button" id="modalSignupBtn">Sign Up</button>
                </div>
            </form>
            <!-- Forgot password -->
            <a href="forgot.html" class="link">Forgot password?</a>
            <button id="closeModal" class="btn secondary">Close</button>
            <div id="modalMessage" class="auth-message"></div>
        </div>
    </div>
</header>

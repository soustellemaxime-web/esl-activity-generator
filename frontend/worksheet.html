<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Worksheet Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="translations.js"></script>
  <script src="js/i18n.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="js/images.js"></script>
  <script src="js/api.js"></script>
  <script src="script.js" defer></script>
  <script src="worksheet.js" defer></script>
</head>

<body>

<div class="container">
  <div class="header">
    <h1 data-i18n="title">Worksheet Generator</h1>
    <div>
      <a href="index.html">🏠</a>
      <button id="toggleTheme">🌙</button>
      <button id="toggleLang">
        <img id="langIcon" src="https://flagcdn.com/w20/gb.png" />
      </button>
    </div>
  </div>

  <div class="app-layout">
    
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="card">

        <div class="section">
          <label>
            <span class="icon">📋</span>
            <span data-i18n="wordList">Word List</span>
          </label>
          <textarea id="words"></textarea>
        </div>

        <h3 data-i18n="exercises">Exercises</h3>

        <div class="section checkbox-group">
          <label>
            <input type="checkbox" id="matching">
            🔤 <span data-i18n="matching">Matching (word ↔ image)</span>
          </label>

          <label>
            <input type="checkbox" id="mcq">
            🧠 <span data-i18n="mcq">Multiple Choice</span>
          </label>

          <label>
            <input type="checkbox" id="fill">
            📝 <span data-i18n="fill">Fill in the blanks</span>
          </label>

          <label>
            <input type="checkbox" id="wsearch">
            🧩 <span data-i18n="wsearch">Word Search</span>
          </label>

          <label>
            <input type="checkbox" id="sbuilding">
            🔗 <span data-i18n="sbuilding">Sentence Building</span>
          </label>
        </div>

        <div class="section">
          <label>
            <span class="icon">📐</span>
            <span data-i18n="layout">Layout</span>
          </label>
          <div class="layout-selector">
            <div class="layout-option selected" data-layout="1">
              <div class="layout-preview one">
                <div></div>
              </div>
              <span>1 card</span>
            </div>

            <div class="layout-option" data-layout="2">
              <div class="layout-preview two">
                <div></div>
                <div></div>
              </div>
              <span>2 cards</span>
            </div>

            <div class="layout-option" data-layout="3">
              <div class="layout-preview three">
                <div></div>
                <div></div>
                <div></div>
              </div>
              <span>3 cards</span>
            </div>

            <div class="layout-option" data-layout="4">
              <div class="layout-preview four">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
              </div>
              <span>4 cards</span>
            </div>
          </div>
        </div>

        <div class="button-row">
          <button class="primary" onclick="preview()">
            <span class="icon">👀</span>
            <span data-i18n="preview">Preview</span>
          </button>
          <button id="downloadBtn" onclick="download()">
            <span class="icon">⬇️</span>
            <span data-i18n="download">Download PDF</span>
          </button>
        </div>

      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="card preview-card">
        <h2 data-i18n="preview">Preview</h2>
        <div id="preview">
          <div class="placeholder">
            ⌨️ <span data-i18n="placeholder">Enter words and select exercises to generate a worksheet</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>

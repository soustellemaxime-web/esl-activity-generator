<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Worksheet Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script src="translations.js"></script>
  <script src="js/i18n.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="js/images.js"></script>
  <script src="script.js" defer></script>
  <script src="worksheet.js" defer></script>
  <script src="js/header.js" defer></script>
</head>

<body>

<div class="container">
  <div class="header">
    <img src="/assets/mascots/assistantWorksheet.png" class="title-image">
    <h1 data-i18n="worksheetGenerator">Worksheet Generator</h1>
  </div>

  <div class="app-layout">
    
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="card">
        <div class="section">
          <label>📝 <span data-i18n="worksheetTitle">Worksheet Title</span></label>
          <input id="title">
        </div>
        <div class="mode-group">
          <label>
            <input type="radio" name="mode" value="auto" checked>
            🤖 <span data-i18n="auto">Auto mode</span>
          </label>

          <label>
            <input type="radio" name="mode" value="custom">
            ✍️ <span data-i18n="custom">Custom mode</span>
          </label>
        </div>
        <div class="section" id="auto-settings-words">
          <label>
            <span class="icon">📋</span>
            <span data-i18n="wordList">Word List</span>
          </label>
          <textarea id="words"></textarea>
        </div>

        <div id="auto-settings">
          <h3 data-i18n="exercises">Exercises</h3>
          <div class="section checkbox-group">
            <label>
              <input type="checkbox" id="matching">
              🔤 <span data-i18n="matching">Matching (word ↔ image)</span>
            </label>

            <label>
              <input type="checkbox" id="mcq">
              🧠 <span data-i18n="mcq">Multiple Choice</span>
            </label>

            <label>
              <input type="checkbox" id="fill">
              📝 <span data-i18n="fill">Fill in the blanks</span>
            </label>
          </div>
        </div>

        <div id="custom-settings" style="display:none;">
          <h3>Custom Exercises</h3>
          <div class="custom-actions">
            <button class="action-btn" id="addFill">
              <span class="icon">📝</span>
              <span data-i18n="fill">Fill in words</span>
            </button>

            <button class="action-btn" id="addMCQ">
              <span class="icon">🧠</span>
              <span data-i18n="mcq">Multiple choice</span>
            </button>

            <button class="action-btn" id="addMatching">
              <span class="icon">🔤</span>
              <span data-i18n="matching">Matching</span>
            </button>

            <button class="action-btn" id="addOpenQuestion">
              <span class="icon">❓</span>
              <span data-i18n="openQuestion">Open question</span>
            </button>
          </div>
        </div>
        <div id="decorations" style="display:none;">
          <h3 data-i18n="decorations">Decorations</h3>
          <div class="custom-decorations">
            <button class="action-btn" id="addBorder">
              <span class="icon">🖼️</span>
              <span data-i18n="borders">Borders</span>
            </button>
            <button class="action-btn" id="addSticker">
              <span class="icon">📌</span>
              <span data-i18n="sticker">Stickers</span>
            </button>
            <button class="action-btn" id="addFont">
              <span class="icon">🔤</span>
              <span data-i18n="fonts">Fonts</span>
            </button>
          </div>
        </div>
        <div class="section">
          <label>
            <span class="icon">📐</span>
            <span data-i18n="layout">Layout</span>
          </label>
          <div class="layout-selector">
            <div class="layout-option selected" data-layout="1">
              <div class="layout-preview one">
                <div></div>
              </div>
              <span data-i18n="onecard">1 card</span>
            </div>

            <div class="layout-option" data-layout="2">
              <div class="layout-preview two">
                <div></div>
                <div></div>
              </div>
              <span data-i18n="twocards">2 cards</span>
            </div>

            <div class="layout-option" data-layout="3">
              <div class="layout-preview three">
                <div></div>
                <div></div>
                <div></div>
              </div>
              <span data-i18n="threecards">3 cards</span>
            </div>

            <div class="layout-option" data-layout="4">
              <div class="layout-preview four">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
              </div>
              <span data-i18n="fourcards">4 cards</span>
            </div>
          </div>
        </div>

        <div class="button-row">
          <button class="primary" onclick="preview()">
            <span class="icon">👀</span>
            <span data-i18n="preview">Preview</span>
          </button>
          <button id="downloadBtn" onclick="download()">
            <span class="icon">⬇️</span>
            <span data-i18n="download">Download PDF</span>
          </button>
        </div>

      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="card preview-card">
        <div class="preview-header">
          <h2 data-i18n="preview">Preview</h2>
          <div class="preview-actions">
            <button class="btn secondary" onclick="saveWorksheet()"> 
              <span class="icon">💾</span>
              <span data-i18n="save">Save</span>
            </button>
            <button class="btn secondary" onclick="toggleDashboard()">
              <span class="icon">📂</span>
              <span data-i18n="loadWorksheets">Load Worksheets</span>
            </button>
          </div>
        </div>
        <div id="dashboard" class="dashboard hidden">
          <h3 data-i18n="myWorksheets">My Worksheets</h3>
          <div id="worksheetsList" class="worksheet-list"></div>
        </div>
        <div id="preview">
          <div class="placeholder">
            ⌨️ <span data-i18n="placeholder">Enter words and select exercises to generate a worksheet</span>
          </div>
        </div>
        <div id="pageControls"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

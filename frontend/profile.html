<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="frontStyles/profile.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/header.js" defer></script>
  <script src="js/features/profile/profile.js" defer></script>
</head>
<body>
    <div id="notLogged" class="card hidden">
        <span>Please login to access profiles.</span>
    </div>
    <div id="profile-container" class="hidden">
        <div id="profile-header">
            <h2 id="profile-username">User</h2>
            <span id="profile-plan">Free</span>
        </div>
        <div id="username-edit" class="hidden">
            <input type="text" id="usernameInput" placeholder="Enter username" />
            <button id="saveUsernameBtn">Edit Username</button>
        </div>
        <div id="profile-stats">
        <span id="stat-rating">⭐ 0</span>
        <span id="stat-items">📦 0 items</span>
        <span id="stat-shared">🌍 0 shared</span>
        </div>
        <hr />
        <div id="profile-items"></div>
    </div>
    <div id="profile-pagination"></div>
</body>
</html>

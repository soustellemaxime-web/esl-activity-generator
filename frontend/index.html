<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bingo Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<h1>Bingo Generator</h1>

<label>Title</label>
<input id="title" placeholder="___ Bingo">

<label>
<input type="checkbox" id="freeCenter">Free center square
</label>

<p></p>

<label class="checkbox-row">
  <input type="checkbox" id="uppercase">Convert words to UPPERCASE
</label>

<p></p>

<label for="displayMode">Display mode</label>
<select id="displayMode">
  <option value="text">Text only</option>
  <option value="image-word">Image + word</option>
  <option value="image">Image only</option>
</select>

<label>Grid Size</label>
<select id="gridSize">
  <option value="3">3 x 3</option>
  <option value="4">4 x 4</option>
  <option value="5">5 x 5</option>
</select>

<p id="wordRequirement">Words: 0 / 9</p>

<label>Word List</label>
<textarea id="words"></textarea>

<label>Number of Cards</label>
<input id="cardCount" type="number" value="5">

<button onclick="preview()">Preview</button>
<button onclick="download()">Download PDF</button>

<h2>Preview (4 first cards)</h2>
<div id="preview">
  <p id="loading" style="display:none;">Loading...</p>
</div>

</body>
</html>

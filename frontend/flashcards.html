<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flashcards Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles/flashcards.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/images.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="script.js" defer></script>
  <script src="flashcards.js" defer></script>
  <script src="js/header.js" defer></script>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>Flashcards Generator</h1>
  </div>
  <div class="app-layout">
    <div class="left-panel">
      <div class="card">
        <div class="mode-group section">
          <label>
            <input type="radio" name="mode" value="auto" checked>
            🤖 <span data-i18n="auto">Auto mode</span>
          </label>

          <label>
            <input type="radio" name="mode" value="custom">
            ✍️ <span data-i18n="custom">Custom mode</span>
          </label>
        </div>
        <div class="section grid-2">
          <div>
            <label for="displayMode">🖼️ Display mode</label>
            <select id="displayMode">
              <option value="text">Text only</option>
              <option value="image-word">Image + word</option>
              <option value="image">Image only</option>
            </select>
          </div>
        </div>
        <div class="section">
          <label>
            <input type="checkbox" id="cutLines"> ✂️ Show cut lines
          </label>
        </div>
        <div class="section">
          <label>📋 Word List</label>
          <textarea id="words"></textarea>
        </div>
        <button id="addCardBtn" class="btn secondary hidden">➕ Add Card</button>
        <div class="button-row">
          <button class="primary" onclick="preview()">👀 Preview</button>
          <button id="downloadBtn" onclick="download()">⬇️ Download PDF</button>
        </div>
      </div>
    </div>
    <div class="right-panel">
      <div class="card preview-card">
        <div class="preview-header">
          <h2 data-i18n="preview">Preview</h2>
          <div class="preview-actions">
            <button class="btn secondary" onclick="saveFlashcards()"> 
              <span class="icon">💾</span>
              <span>Save Flashcards</span>
            </button>
            <button class="btn secondary" onclick="toggleDashboard()">
              <span class="icon">📂</span>
              <span>Load Flashcards</span>
            </button>
          </div>
        </div>
        <div id="dashboard" class="dashboard hidden">
          <h3>My Flashcards</h3>
          <div id="worksheetsList" class="worksheet-list"></div>
        </div>
        <div id="preview">
          <div class="placeholder">
            ⌨️ Start typing your words to generate your flashcards
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>

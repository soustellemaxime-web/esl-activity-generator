<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flashcards Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles/flashcards.css">
  <link rel="stylesheet" href="borders.css">
  <link rel="stylesheet" href="tutorial.css">
  <link rel="stylesheet" href="frontStyles/upgradeModal.css">
  <link rel="stylesheet" href="frontStyles/toast.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/components/toast.js" defer></script>
  <script src="translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/images.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="script.js" defer></script>
  <script src="js/features/flashcards/state.js" defer></script>
  <script src="js/features/flashcards/actions.js" defer></script>
  <script src="js/features/flashcards/renderer.js" defer></script>
  <script src="js/features/flashcards/flashcards.js" defer></script>
  <script src="js/tutorial/tutorialSteps.js" defer></script>
  <script src="js/tutorial/tutorial.js" defer></script>
  <script src="js/header.js" defer></script>
</head>

<body>

<div class="container">
  <div class="header">
    <img src="/assets/mascots/assistantFlashcard.png" class="title-image">
    <h1 data-i18n="flashcardsGenerator">Flashcards Generator</h1>
  </div>
  <div id="loginWarning" class="login-warning">
    <span>🔒 </span> <span data-i18n="loginWarning">You are not logged in — your work may be lost.</span>
  </div>
  <div class="app-layout">
    <div class="left-panel">
      <div class="card">
        <div class="mode-group section">
          <label>
            <input type="radio" name="mode" value="auto" checked>
            🤖 <span data-i18n="auto">Auto mode</span>
          </label>
          <label>
            <input type="radio" name="mode" value="custom">
            ✍️ <span data-i18n="custom">Custom mode</span>
          </label>
        </div>
        <div class="section grid-2">
          <div>
            <label for="displayMode">
              <span class="icon">🖼️ </span>
              <span data-i18n="displayMode">Display mode</span>
            </label>
            <select id="displayMode" data-tooltip="settings">
              <option value="text" data-i18n="textOnly">Text only</option>
              <option value="image-word" data-i18n="textAndImage">Image + word</option>
              <option value="image" data-i18n="imageOnly">Image only</option>
            </select>
          </div>
        </div>
        <div class="section">
          <label>
            <input type="checkbox" id="cutLines"> 
            <span class="icon">✂️ </span>
            <span data-i18n="cutLines">Show cut lines</span>
          </label>
        </div>
        <div class="section">
          <label>
            <span class="icon">📋</span>
            <span data-i18n="wordList">Word List</span>
          </label>
          <div class="textarea-wrapper">
            <textarea id="words" data-tooltip="wordList"></textarea>
          </div>
        </div>
        <button id="addCardBtn" class="btn secondary hidden">
          <span class="icon">➕ </span>
          <span data-i18n="addCard">Add Card</span>
        </button>
        <button id="borderBtn" class="btn secondary hidden" onclick="showFlashcardBorderPicker()">
          <span class="icon">🎨 </span>
          <span data-i18n="borders">Borders</span>
        </button>
        <div class="button-row">
          <button class="primary" onclick="preview()">
            <span class="icon">👀</span>
            <span data-i18n="preview">Preview</span>
          </button>
          <button id="downloadBtn" class="locked" onclick="download()">
            <span class="icon">⬇️</span>
            <span class="lock">🔒</span>
            <span data-i18n="download">Download PDF</span>
          </button>
          <button id="replayTutorialBtn" class="btn secondary">
            <span class="icon">🎓 </span>
            <span data-i18n="tutorial">Tutorial</span>
          </button>
        </div>
      </div>
    </div>
    <div class="right-panel">
      <div class="card preview-card">
        <div class="preview-header">
          <h2 data-i18n="preview">Preview</h2>
          <div class="preview-actions">
            <div id="limitsBar" class="limits-bar hidden">
              <div class="limit-item" id="saveLimit"></div>
              <div class="limit-item" id="downloadLimit"></div>
            </div>
            <button id="saveBtn" class="btn secondary locked" onclick="openSaveModal()"> 
              <span class="icon">💾</span>
              <span class="lock">🔒</span>
              <span data-i18n="saveFlashcards">Save Flashcards</span>
            </button>
            <button id="loadBtn" class="btn secondary locked" onclick="toggleDashboard()">
              <span class="icon">📂</span>
              <span class="lock">🔒</span>
              <span data-i18n="loadFlashcards">Load Flashcards</span>
            </button>
          </div>
        </div>
        <div id="dashboard" class="dashboard hidden">
          <h3>My Flashcards</h3>
          <div id="worksheetsList" class="worksheet-list"></div>
        </div>
        <div id="preview" data-tooltip="preview">
          <div class="placeholder">
            ⌨️ Start typing your words to generate your flashcards
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer"></div>
</body>
</html>

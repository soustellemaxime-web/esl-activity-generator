<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Community Item</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="frontStyles/community.css">
    <link rel="stylesheet" href="frontStyles/community-item.css">
    <link rel="stylesheet" href="frontStyles/upgradeModal.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translations.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/header.js" defer></script>
    <script src="js/features/community/community-item.js" defer></script>
</head>

<body>
  <div class="item-container">
    <div class="item-header">
      <h1 id="itemTitle"></h1>
      <div class="item-actions">
        <div id="ratingContainer">
          <div id="ratingStars">
            <span onclick="rate(1)">⭐</span>
            <span onclick="rate(2)">⭐</span>
            <span onclick="rate(3)">⭐</span>
            <span onclick="rate(4)">⭐</span>
            <span onclick="rate(5)">⭐</span>
          </div>
          <div id="ratingValue">⭐ 0</div>
        </div>
        <button id="useTemplateBtn" onclick="useTemplate()">🧩 Use this template</button>
        <button onclick="downloadItem()">⬇️ Download</button>
      </div>
      <div class="limit-bar-community-wrapper">
        <div id="limitsBar" class="limits-bar hidden">
          <div class="limit-item" id="communityDownloadLimit"></div>
        </div>
      </div>
    </div>
    <div class="preview-wrapper">
        <div id="itemSkeleton" class="item-skeleton">
          <div class="skeleton-title"></div>
          <div class="skeleton-actions"></div>
          <div class="skeleton-preview"></div>
        </div>
      <div id="itemContent" class="hidden">
        <div class="ci-preview-controls">
          <button id="ci-zoom-out">➖</button>
          <span id="ci-zoom-level">100%</span>
          <button id="ci-zoom-in">➕</button>
          <button id="ci-fullscreen">⛶</button>
          <button id="ci-prev">◀</button>
          <span id="ci-page-info">1 / 1</span>
          <button id="ci-next">▶</button>
        </div>
        <div class="ci-preview-viewport">
          <div id="preview"></div>
        </div>
      </div>
    </div>
  </div>
</body>

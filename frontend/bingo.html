<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bingo Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tutorial.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script src="translations.js"></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/images.js"></script>
  <script src="script.js" defer></script>
  <script src="bingo.js" defer></script>
  <script src="js/tutorial/tutorialSteps.js" defer></script>
  <script src="js/tutorial/tutorial.js" defer></script>
  <script src="js/header.js" defer></script>
</head>

<body>

<div class="container">
  <div class="header">
    <img src="/assets/mascots/assistantBingo.png" class="title-image">
    <h1 data-i18n="bingoGenerator">Bingo Generator</h1>
  </div>
  <div class="app-layout">
    <div class="left-panel">
      <div class="card">
        <div class="section">
          <label>
            <span class="icon">📝 </span>
            <span data-i18n="title">Title</span>
          </label>
          <input id="title">
        </div>

        <h3 data-i18n="options">Options</h3>
        <div class="section">
          <div class="checkbox-group">
            <label><input type="checkbox" id="freeCenter"> 
              <span data-i18n="freeCenter">Free center square</span>
            </label>
            <!--<label><input type="checkbox" id="uppercase"> Convert to UPPERCASE</label>-->
          </div>
        </div>

        <div class="section grid-2">
          <div>
            <label for="displayMode">
              <span class="icon">🖼️ </span>
              <span data-i18n="displayMode">Display mode</span>
            </label>
            <select id="displayMode">
              <option value="text" data-i18n="textOnly">Text only</option>
              <option value="image-word" data-i18n="textAndImage">Image + word</option>
              <option value="image" data-i18n="imageOnly">Image only</option>
            </select>
          </div>

          <div>
            <label>
              <span class="icon">🎯 </span>
              <span data-i18n="gridSize">Grid Size</span>
            </label>
            <select id="gridSize">
              <option value="3">3 x 3</option>
              <option value="4">4 x 4</option>
              <option value="5">5 x 5</option>
            </select>
          </div>
        </div>

        <div class="section">
          <p id="wordRequirement">
            <span data-i18n="words">Words</span>
            <span>: 0 / 9 </span>
          </p>
          <label>
            <span class="icon">📋 </span>
            <span data-i18n="wordList">Word List</span>
          </label>
          <textarea id="words"></textarea>
        </div>

        <div class="section">
          <label>
            <span class="icon">#️⃣ </span>
            <span data-i18n="numberCards">Number of Cards</span>
          </label>
          <input id="cardCount" type="number" value="4">
        </div>

        <div class="button-row">
          <button class="primary" onclick="preview()">
            <span class="icon">👀</span>
            <span data-i18n="preview">Preview</span>
          </button>
          <button id="downloadBtn" onclick="download()">
            <span class="icon">⬇️</span>
            <span data-i18n="download">Download PDF</span>
          </button>
          <button id="replayTutorialBtn" class="btn secondary">
            <span class="icon">🎓 </span>
            <span data-i18n="tutorial">Tutorial</span>
          </button>
        </div>
      </div>
    </div>
    <div class="right-panel">
      <div class="card preview-card">
        <div class="preview-header">
          <h2 data-i18n="previewBingo">Preview (2 cards)</h2>
          <div class="preview-actions">
            <button class="btn secondary" onclick="saveBingo()"> 
              <span class="icon">💾</span>
              <span data-i18n="saveBingo">Save Bingo</span>
            </button>
            <button class="btn secondary" onclick="toggleDashboard()">
              <span class="icon">📂</span>
              <span data-i18n="loadBingo">Load Bingos</span>
            </button>
          </div>
        </div>
        <div id="dashboard" class="dashboard hidden">
          <h3>My Bingos</h3>
          <div id="worksheetsList" class="worksheet-list"></div>
        </div>
        <div id="preview">
          <div class="placeholder">
            ⌨️ Start typing your words to generate your bingo cards
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>

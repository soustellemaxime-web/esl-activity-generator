<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Community</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="frontStyles/community.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translations.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/header.js" defer></script>
    <script src="js/features/community/community.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>🌍 Community Sharing</h1>
        <div id="notLogged" class="card hidden">
            <span>Please login to access the community sharing feature.</span>
        </div>
        <div id="communityContent" class="hidden">
            <div class="community-controls">
                <input type="text" placeholder="Search..." id="searchInput">
                <select id="filterType">
                <option value="all">All</option>
                <option value="worksheet">Worksheets</option>
                <option value="bingo">Bingo</option>
            <option value="flashcards">Flashcards</option>
            </select>
            <div id="communityGrid" class="community-grid"></div>
        </div>
    </div>
</body>

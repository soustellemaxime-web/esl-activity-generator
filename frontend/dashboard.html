<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script src="js/header.js" defer></script>
  <script src="dashboard.js" defer></script>
</head>

<body>
    <div class="container">
    <h1>📂 My Dashboard</h1>
    <div id="notLogged" class="card hidden">
        Please login to access your dashboard.
    </div>
    <div id="dashboardContent" class="hidden">
        <div class="tabs">
            <button class="tab active" onclick="switchTab(event, 'worksheet')">📝 Worksheets</button>
            <button class="tab" onclick="switchTab(event, 'flashcards')">🃏 Flashcards</button>
            <button class="tab" onclick="switchTab(event, 'bingo')">🎯 Bingo</button>
        </div>
            <div id="worksheetTab" class="tab-content"></div>
            <div id="flashcardsTab" class="tab-content hidden"></div>
            <div id="bingoTab" class="tab-content hidden"></div>
        </div>
    </div>
</body>
</html>
